services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: xhs_agent
      POSTGRES_USER: xhs
      POSTGRES_PASSWORD: xhs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhs -d xhs_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

